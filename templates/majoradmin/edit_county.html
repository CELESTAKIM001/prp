{% extends 'majoradmin/base.html' %}

{% block title %}Edit County - Major Admin{% endblock %}

{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{% url 'majoradmin_dashboard' %}">Dashboard</a></li>
<li class="breadcrumb-item"><a href="{% url 'majoradmin_counties' %}">Counties</a></li>
<li class="breadcrumb-item active">Edit</li>
{% endblock %}

{% block page_content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="table-card">
            <div class="card-header">
                <h5 class="mb-0">Edit County</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">County Name</label>
                        <input type="text" name="name" class="form-control" value="{{ county.name }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">County Code</label>
                        <input type="text" name="code" class="form-control" value="{{ county.code }}" required>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="is_active" class="form-check-input" id="is_active" {% if county.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">Active</label>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'majoradmin_counties' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
