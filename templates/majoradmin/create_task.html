{% extends 'majoradmin/base.html' %}

{% block title %}Create Task - Major Admin{% endblock %}

{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{% url 'majoradmin_dashboard' %}">Dashboard</a></li>
<li class="breadcrumb-item"><a href="{% url 'majoradmin_tasks' %}">Tasks</a></li>
<li class="breadcrumb-item active">Create Task</li>
{% endblock %}

{% block page_content %}
<div class="row mb-4">
    <div class="col-12">
        <h2 style="color: #333; font-weight: 600;"><i class="fas fa-tasks me-2" style="color: #667eea;"></i>Create New Task</h2>
    </div>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="table-card" style="border-radius: 16px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            <div class="card-header" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1.5rem;">
                <h5 class="mb-0" style="font-weight: 600;"><i class="fas fa-plus-circle me-2"></i>Task Details</h5>
            </div>
            <div class="card-body" style="padding: 2rem;">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold" style="color: #333;"><i class="fas fa-heading me-2" style="color: #667eea;"></i>Task Title</label>
                        <input type="text" name="title" class="form-control" required style="border-radius: 10px; padding: 12px;" placeholder="Enter task title">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold" style="color: #333;"><i class="fas fa-align-left me-2" style="color: #667eea;"></i>Description</label>
                        <textarea name="description" class="form-control" rows="5" required style="border-radius: 10px; padding: 12px;" placeholder="Describe the task in detail..."></textarea>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold" style="color: #333;"><i class="fas fa-user-plus me-2" style="color: #667eea;"></i>Assign To</label>
                        <select name="assigned_to" class="form-select" required style="border-radius: 10px; padding: 12px;">
                            <option value="">Select User</option>
                            {% for user in users %}
                            <option value="{{ user.id }}">{{ user.username }} - {{ user.email }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold" style="color: #333;"><i class="fas fa-flag me-2" style="color: #667eea;"></i>Priority</label>
                            <select name="priority" class="form-select" style="border-radius: 10px; padding: 12px;">
                                <option value="LOW">🔵 Low</option>
                                <option value="NORMAL" selected>🟡 Normal</option>
                                <option value="HIGH">🔴 High</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold" style="color: #333;"><i class="fas fa-calendar-alt me-2" style="color: #667eea;"></i>Due Date</label>
                            <input type="date" name="due_date" class="form-control" style="border-radius: 10px; padding: 12px;">
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'majoradmin_tasks' %}" class="btn" style="background: #f8f9fa; color: #666; border-radius: 10px; padding: 12px 25px; font-weight: 500;">
                            <i class="fas fa-arrow-left me-2"></i>Cancel
                        </a>
                        <button type="submit" class="btn" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 10px; padding: 12px 30px; font-weight: 600;">
                            <i class="fas fa-plus me-2"></i>Create Task
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
.form-control:focus {
    border-color: #667eea;
    box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
}
.form-select:focus {
    border-color: #667eea;
    box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
}
</style>
{% endblock %}
