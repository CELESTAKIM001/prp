{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error | Property Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .error-container {
            text-align: center;
            padding: 3rem;
            max-width: 800px;
            margin: 20px;
        }
        
        .error-code {
            font-size: 12rem;
            font-weight: 700;
            color: white;
            line-height: 1;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .error-title {
            font-size: 2.5rem;
            color: white;
            margin: 20px 0;
            font-weight: 600;
        }
        
        .error-message {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .illustration {
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
            position: relative;
        }
        
        .illustration i {
            font-size: 8rem;
            color: white;
            animation: cog-spin 4s linear infinite;
        }
        
        @keyframes cog-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .btn-home {
            background: white;
            color: #f5576c;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            color: #f5576c;
        }
        
        .warning-bars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }
        
        .bar {
            position: absolute;
            width: 4px;
            background: rgba(255,255,255,0.3);
            animation: warning-pulse 1.5s infinite;
        }
        
        @keyframes warning-pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
        
        .bar:nth-child(1) { left: 10%; height: 60%; top: 20%; animation-delay: 0s; }
        .bar:nth-child(2) { left: 30%; height: 40%; top: 30%; animation-delay: 0.2s; }
        .bar:nth-child(3) { left: 50%; height: 80%; top: 10%; animation-delay: 0.4s; }
        .bar:nth-child(4) { left: 70%; height: 50%; top: 25%; animation-delay: 0.6s; }
        .bar:nth-child(5) { left: 90%; height: 70%; top: 15%; animation-delay: 0.8s; }
    </style>
</head>
<body>
    <div class="warning-bars">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>
    
    <div class="error-container">
        <div class="illustration">
            <i class="fas fa-cogs"></i>
        </div>
        <div class="error-code">500</div>
        <h1 class="error-title">Server Error</h1>
        <p class="error-message">
            Something went wrong on our end! Our servers are taking a short break.<br>
            Our team has been notified and is working on fixing this issue.
        </p>
        <a href="/" class="btn-home">
            <i class="fas fa-home"></i>
            Back to Home
        </a>
    </div>
</body>
</html>
